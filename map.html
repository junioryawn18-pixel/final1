<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusLife - Map</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav-wrap">
      <div class="logo">⭐ CampusLife</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="dining.html">Dining</a>
        <a href="map.html" class="active">Map</a>
      </nav>
      <button class="alert-btn">Alerts</button>
    </div>
  </header>

  <main class="container">
    <section class="hero-section">
      <h1>Campus Map</h1>
      <p class="section-subtext">Navigate your way around campus with our interactive map.</p>
    </section>

    <section class="content-section">
      <div class="map-container">
        <div class="map-controls">
          <button onclick="zoomIn()" class="btn btn-primary">Zoom In</button>
          <button onclick="zoomOut()" class="btn btn-secondary">Zoom Out</button>
          <button onclick="showMyLocation()" class="btn btn-success">My Location</button>
        </div>
        <div id="mapArea" class="map-image">
          <img src="images/campus-map.jpg" alt="Campus Map" style="width:100%; max-width:800px;">
        </div>
      </div>

      <div class="search-section">
        <h3>Find Locations</h3>
        <input type="text" id="locationSearch" placeholder="Search for library, union, science..." class="form-control">
        <button onclick="searchLocation()" class="btn btn-primary mt-2">Search</button>
        <div id="locationResult" class="result-box mt-2"></div>
      </div>

      <div class="info-section">
        <h3>Map Information</h3>
        <div id="mapInfo" class="info-box"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="dining.html">Dining</a>
        <a href="map.html">Map</a>
      </div>
      <p>© 2026 CampusLife Super App</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
